<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meal Plan</title>
<style>
  :root {
    --bg: #f9f8f6; --surface: #ffffff; --border: #e8e5e0; --border-light: #f0ede8;
    --text: #1a1a1a; --text-2: #666; --text-3: #999;
    --accent: #c0392b; --accent-light: #fdf0ef;
    --green: #27500A; --green-light: #EAF3DE;
    --blue: #0C447C; --blue-light: #E6F1FB;
    --amber: #633806; --amber-light: #FAEEDA;
    --purple: #5B2D8E; --purple-light: #F3EAF9;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .header-back { font-size: 14px; color: var(--accent); cursor: pointer; font-weight: 500; }
  .bottom-nav { background: var(--surface); border-top: 1px solid var(--border); padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); display: flex; position: sticky; bottom: 0; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; cursor: pointer; border: none; background: none; color: var(--text-3); font-size: 10px; font-weight: 500; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; line-height: 1; }
  .main { flex: 1; padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
  .card-head { padding: 12px 14px; border-bottom: 1px solid var(--border-light); }
  .card-title { font-size: 15px; font-weight: 600; }

  .pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .pill-cal { background: var(--amber-light); color: var(--amber); }
  .pill-pro { background: var(--blue-light); color: var(--blue); }
  .pill-norice { background: var(--green-light); color: var(--green); }
  .pill-rice { background: var(--purple-light); color: var(--purple); }
  .pill-beef { background: var(--amber-light); color: var(--amber); }
  .pill-chicken { background: var(--blue-light); color: var(--blue); }
  .pill-batch { background: #e8f4fd; color: #1a6a9a; }
  .pill-easy { background: #fef3cd; color: #856404; }
  .pill-leftover { background: #f0ede8; color: var(--text-2); }
  .pill-time { background: #f0ede8; color: var(--text-2); }

  .meal-row { padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start; cursor: pointer; }
  .meal-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .meal-detail { font-size: 12px; color: var(--text-2); line-height: 1.5; margin: 4px 0 8px; }
  .meal-mac { font-size: 11px; color: var(--text-3); text-align: right; white-space: nowrap; }
  .meal-mac strong { display: block; font-size: 14px; font-weight: 600; color: var(--text); }
  .tip-bar { padding: 10px 14px; background: var(--accent-light); font-size: 12px; color: var(--accent); border-top: 1px solid #f5c6c2; }
  .tip-bar b { font-weight: 700; }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text-2); white-space: nowrap; }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .shop-section { margin-bottom: 16px; }
  .shop-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 8px; padding-left: 2px; }
  .shop-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer; }
  .shop-item.checked { opacity: .45; }
  .shop-item.checked .shop-name { text-decoration: line-through; }
  .shop-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .shop-item.checked .shop-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .shop-name { font-size: 14px; font-weight: 500; flex: 1; }
  .shop-qty { font-size: 12px; color: var(--text-3); }
  .shop-actions { display: flex; gap: 8px; margin-bottom: 14px; }
  .btn { padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }

  .weight-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .weight-input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; background: var(--surface); }
  .progress-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .progress-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }
  .weight-log { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .weight-log-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border-light); font-size: 14px; }
  .weight-log-row:last-child { border-bottom: none; }
  .weight-log-date { color: var(--text-2); font-size: 12px; }
  .weight-delta { font-size: 12px; font-weight: 600; }
  .delta-down { color: var(--green); }
  .delta-up { color: var(--accent); }
  .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  .page-sub-line { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }

  /* Week builder */
  .week-day { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
  .week-day-head { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; background: #fafaf8; border-bottom: 1px solid var(--border-light); }
  .week-day-name { font-size: 13px; font-weight: 700; }
  .week-day-body { padding: 12px 14px; }
  .week-day-empty { color: var(--text-3); font-size: 13px; font-style: italic; }
  .week-day-meal { display: flex; justify-content: space-between; align-items: start; gap: 8px; }
  .week-day-meal-name { font-size: 14px; font-weight: 600; }
  .week-day-meal-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .week-actions { display: flex; gap: 6px; margin-top: 10px; }

  /* Recipe detail */
  .recipe-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin: 18px 0 8px; }
  .recipe-section-title:first-child { margin-top: 0; }
  .ingredient-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 14px; }
  .ingredient-row:last-child { border-bottom: none; }
  .ingredient-qty { color: var(--text-2); font-size: 13px; }
  .step-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
  .step-row:last-child { border-bottom: none; }
  .step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .step-text { font-size: 14px; line-height: 1.6; padding-top: 1px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal-sheet { background: var(--surface); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 20px 16px calc(20px + env(safe-area-inset-bottom)); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal-option { padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .modal-option:active { background: #f5f4f1; }
  .modal-option.leftover-opt { color: var(--text-2); font-style: italic; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Add recipe form */
  .fab { position: fixed; bottom: 76px; right: 16px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.2); cursor: pointer; z-index: 90; border: none; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; display: block; }
  .form-input, .form-textarea, .form-select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); font-family: inherit; }
  .form-textarea { resize: vertical; min-height: 70px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .tag-toggle-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-toggle { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 500; cursor: pointer; background: var(--surface); color: var(--text-2); }
  .tag-toggle.selected { background: var(--text); color: #fff; border-color: var(--text); }
  .dyn-list-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .dyn-list-row input { flex: 1; }
  .dyn-remove { width: 28px; height: 28px; flex-shrink: 0; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text-3); font-size: 14px; cursor: pointer; }
  .dyn-add-btn { font-size: 13px; color: var(--accent); font-weight: 600; cursor: pointer; padding: 4px 0; }
  .bank-options { display: flex; gap: 8px; margin-bottom: 14px; }

  /* Daily log */
  .log-date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .log-date-nav { display: flex; gap: 10px; align-items: center; }
  .log-date-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .log-date-label { font-size: 14px; font-weight: 600; min-width: 90px; text-align: center; }
  .log-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
  .log-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 8px; text-align: center; }
  .log-stat-val { font-size: 20px; font-weight: 700; }
  .log-stat-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; text-transform: uppercase; letter-spacing: .03em; }
  .log-stat.over .log-stat-val { color: var(--accent); }
  .log-stat.under .log-stat-val { color: var(--green); }
  .log-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin: 16px 0 8px; display: flex; justify-content: space-between; align-items: center; }
  .log-add-btn { font-size: 12px; color: var(--accent); font-weight: 600; cursor: pointer; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; }
  .log-entry-name { font-size: 14px; font-weight: 500; }
  .log-entry-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .log-entry-mac { font-size: 12px; color: var(--text-2); text-align: right; }
  .log-entry-del { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text-3); font-size: 12px; cursor: pointer; margin-left: 8px; flex-shrink: 0; }
  .log-empty-row { padding: 14px; text-align: center; color: var(--text-3); font-size: 13px; font-style: italic; }
  .cal-budget-bar-wrap { margin-bottom: 4px; }
  .cal-budget-track { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; position: relative; }
  .cal-budget-fill { height: 100%; border-radius: 5px; transition: width .3s; }
  .quick-add-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .quick-add-chip { padding: 5px 10px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); font-size: 11px; color: var(--text-2); cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title" id="page-title">This Week</div>
      <div class="header-sub" id="page-sub">10pm–noon fast · 1,400–1,540 cal/day</div>
    </div>
    <div class="header-back" id="header-back" style="display:none" onclick="closeDetail()">Done</div>
  </div>

  <div class="main" id="main"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showPage('week')" id="nav-week"><span class="nav-icon">📅</span>Week</button>
    <button class="nav-btn" onclick="showPage('bank')" id="nav-bank"><span class="nav-icon">📖</span>Bank</button>
    <button class="nav-btn" onclick="showPage('log')" id="nav-log"><span class="nav-icon">📝</span>Log</button>
    <button class="nav-btn" onclick="showPage('midday')" id="nav-midday"><span class="nav-icon">🥗</span>Midday</button>
    <button class="nav-btn" onclick="showPage('shop')" id="nav-shop"><span class="nav-icon">🛒</span>Shop</button>
    <button class="nav-btn" onclick="showPage('weight')" id="nav-weight"><span class="nav-icon">📉</span>Progress</button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<button class="fab" id="add-recipe-fab" onclick="openAddRecipe()" style="display:none">+</button>

<script>
// ─── FOOD BANK ──────────────────────────────────────────────────────────────
const FOOD_BANK = [
  {

  {

    steps:[

  },

function todayKey(offsetDays = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.toISOString().split('T')[0];
}

function getLogForDate(key) {
  if (!dailyLogs[key]) dailyLogs[key] = { breakfast: [], midday: [], dinner: [], snacks: [], exercise: [] };
  // migrate old flat 'food' array if it exists from a previous version
  if (dailyLogs[key].food) {
    dailyLogs[key].snacks = dailyLogs[key].food;
    delete dailyLogs[key].food;
  }
  ['breakfast','midday','dinner','snacks','exercise'].forEach(k => { if (!dailyLogs[key][k]) dailyLogs[key][k] = []; });
  return dailyLogs[key];
}

function getMeal(id) { return getAllMeals().find(m => m.id === id); }

function tagPill(tag) {
  const map = {beef:['pill-beef','Beef'],chicken:['pill-chicken','Chicken'],norice:['pill-norice','No starch'],rice:['pill-rice','Rice night'],batch:['pill-batch','Batch cook'],easy:['pill-easy','Easy / Costco']};

function renderWeek() {
  document.getElementById('page-title').textContent = 'This Week';
  document.getElementById('page-sub').textContent = 'Tap a day to pick dinner or mark leftovers';
  document.getElementById('header-back').style.display = 'none';
  document.getElementById('add-recipe-fab').style.display = 'none';

  let totalCal = 0, totalPro = 0, plannedDays = 0;
  let html = '';

  DAYS.forEach(day => {
    const entry = weekPlan[day];
    html += `<div class="week-day"><div class="week-day-head"><div class="week-day-name">${day}</div>`;

    if (entry) {
      let meal, label;
      if (entry.type === 'meal') {
        meal = getMeal(entry.id);
        label = '';
      } else if (entry.type === 'leftover') {
        meal = getMeal(entry.id);
        label = `Leftover from ${entry.from}`;
      }
      if (meal) {
        totalCal += meal.cal; totalPro += meal.pro; plannedDays++;
        html += `<button class="btn btn-sm" onclick="openPicker('${day}')">Change</button></div>
          <div class="week-day-body">
            <div class="week-day-meal">
              <div onclick="openRecipe('${meal.id}')" style="cursor:pointer">
                <div class="week-day-meal-name">${meal.name}</div>
                <div class="week-day-meal-sub">${label ? label + ' · ' : ''}${meal.cal} cal · ${meal.pro}g protein</div>
              </div>
            </div>
          </div>`;
      }
    } else {
      html += `<button class="btn btn-sm btn-primary" onclick="openPicker('${day}')">Pick dinner</button></div>
        <div class="week-day-body"><div class="week-day-empty">Not planned yet</div></div>`;
    }
    html += `</div>`;
  });

  let summaryHtml = '';
  if (plannedDays > 0) {
    summaryHtml = `<div class="card" style="padding:12px 14px;margin-bottom:14px">
      <div style="font-size:13px;color:var(--text-2)">${plannedDays} of 7 days planned · avg <strong style="color:var(--text)">${Math.round(totalCal/plannedDays)} cal</strong> / <strong style="color:var(--text)">${Math.round(totalPro/plannedDays)}g protein</strong> per dinner</div>
    </div>`;
  }

  document.getElementById('main').innerHTML = summaryHtml + html;
}

function openPicker(day) {
  pickingDay = day;
  const plannedMeals = DAYS.map(d => ({day:d, entry:weekPlan[d]})).filter(x => x.entry && x.day !== day);

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Pick dinner for ${day}</div>
      <div class="page-sub-line">Choose from the food bank, or mark as leftovers</div>`;

  if (plannedMeals.length > 0) {
    html += `<div class="recipe-section-title">Leftovers from this week</div>`;
    plannedMeals.forEach(x => {
      const meal = getMeal(x.entry.id);
      if (meal) {
        html += `<div class="modal-option leftover-opt" onclick="setLeftover('${day}','${x.day}','${meal.id}')">${meal.name} <span style="color:var(--text-3)">(from ${x.day})</span></div>`;
      }
    });
  }

  html += `<div class="recipe-section-title">Food bank</div>`;
  getAllMeals().forEach(m => {
    html += `<div class="modal-option" onclick="setMeal('${day}','${m.id}')">${m.name} <span style="color:var(--text-3)">· ${m.cal} cal</span></div>`;
  });

  html += `<button class="btn btn-full" style="margin-top:10px" onclick="closeModal()">Cancel</button>
    </div></div>`;

  document.getElementById('modal-root').innerHTML = html;
}

function setMeal(day, id) {
  weekPlan[day] = {type:'meal', id};
  saveState();
  closeModal();
  renderWeek();
  showToast(`${day} set`);
}

function setLeftover(day, fromDay, id) {
  weekPlan[day] = {type:'leftover', id, from: fromDay};
  saveState();
  closeModal();
  renderWeek();
  showToast(`${day} set as leftovers`);
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// ─── DAILY LOG PAGE ─────────────────────────────────────────────────────────
let calTarget = parseInt(localStorage.getItem('calTarget')) || 1480;
let proTarget = parseInt(localStorage.getItem('proTarget')) || 138;

function formatLogDate(key) {
  const today = todayKey();
  if (key === today) return 'Today';
  if (key === todayKey(-1)) return 'Yesterday';
  if (key === todayKey(1)) return 'Tomorrow';
  const d = new Date(key + 'T00:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function shiftLogDate(delta) {
  const d = new Date(logViewDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  logViewDate = d.toISOString().split('T')[0];
  renderLog();
}

const MEAL_SLOTS = [
  {key:'breakfast', label:'Breakfast', icon:'🍳'},
  {key:'midday', label:'Midday', icon:'🥗'},
  {key:'dinner', label:'Dinner', icon:'🍽️'},
  {key:'snacks', label:'Snacks', icon:'🥨'}
];

function renderLog() {
  document.getElementById('page-title').textContent = 'Daily log';
  document.getElementById('page-sub').textContent = 'Food, exercise, and protein in one place';
  document.getElementById('header-back').style.display = 'none';
  document.getElementById('add-recipe-fab').style.display = 'none';

  const log = getLogForDate(logViewDate);
  const allFood = [...log.breakfast, ...log.midday, ...log.dinner, ...log.snacks];
  const foodCal = allFood.reduce((a,f) => a + f.cal, 0);
  const foodPro = allFood.reduce((a,f) => a + f.pro, 0);
  const exCal = log.exercise.reduce((a,e) => a + e.cal, 0);
  const netCal = foodCal - exCal;
  const calPct = Math.min(100, Math.round((netCal / calTarget) * 100));
  const proPct = Math.min(100, Math.round((foodPro / proTarget) * 100));
  const overUnder = netCal > calTarget ? 'over' : 'under';
  const barColor = netCal > calTarget ? 'var(--accent)' : 'var(--green)';

  let html = `<div class="log-date-row">
    <div class="log-date-nav">
      <button class="log-date-btn" onclick="shiftLogDate(-1)">‹</button>
      <div class="log-date-label">${formatLogDate(logViewDate)}</div>
      <button class="log-date-btn" onclick="shiftLogDate(1)">›</button>
    </div>
    ${logViewDate !== todayKey() ? `<button class="btn btn-sm" onclick="logViewDate=todayKey();renderLog()">Today</button>` : ''}
  </div>

  <div class="log-summary">
    <div class="log-stat ${overUnder}"><div class="log-stat-val">${netCal}</div><div class="log-stat-lbl">Net cal</div></div>
    <div class="log-stat"><div class="log-stat-val">${foodPro}g</div><div class="log-stat-lbl">Protein</div></div>
    <div class="log-stat"><div class="log-stat-val">${exCal}</div><div class="log-stat-lbl">Burned</div></div>
  </div>

  <div class="card" style="padding:14px">
    <div class="cal-budget-bar-wrap">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:6px">
        <span>Calorie budget</span><span>${netCal} / ${calTarget} <span class="log-add-btn" style="margin-left:6px" onclick="openEditTargets()">Edit</span></span>
      </div>
      <div class="cal-budget-track"><div class="cal-budget-fill" style="width:${calPct}%;background:${barColor}"></div></div>
    </div>
    <div class="cal-budget-bar-wrap" style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:6px">
        <span>Protein goal</span><span>${foodPro}g / ${proTarget}g</span>
      </div>
      <div class="cal-budget-track"><div class="cal-budget-fill" style="width:${proPct}%;background:var(--blue)"></div></div>
    </div>
  </div>`;

  MEAL_SLOTS.forEach(slot => {
    const entries = log[slot.key];
    const slotCal = entries.reduce((a,f) => a + f.cal, 0);
    html += `<div class="log-section-title">
      <span>${slot.icon} ${slot.label}${entries.length ? ` <span style="color:var(--text-3);font-weight:400;text-transform:none">· ${slotCal} cal</span>` : ''}</span>
      <span class="log-add-btn" onclick="openAddFood('${slot.key}')">+ Add</span>
    </div>`;

    if (entries.length === 0) {
      html += `<div class="log-empty-row">Nothing logged — tap + Add if you ate something here</div>`;
    } else {
      entries.forEach((f, i) => {
        html += `<div class="log-entry">
          <div><div class="log-entry-name">${f.name}</div></div>
          <div style="display:flex;align-items:center">
            <div class="log-entry-mac">${f.cal} cal<br>${f.pro}g pro</div>
            <button class="log-entry-del" onclick="removeFoodEntry('${slot.key}',${i})">✕</button>
          </div>
        </div>`;
      });
    }
  });

  html += `<div class="log-section-title"><span>🏃 Exercise${log.exercise.length ? ` <span style="color:var(--text-3);font-weight:400;text-transform:none">· −${exCal} cal</span>` : ''}</span><span class="log-add-btn" onclick="openAddExercise()">+ Add</span></div>`;

  if (log.exercise.length === 0) {

function saveTargets() {

function renderMidday() {

// ─── SHOPPING PAGE — generated from weekPlan ──────────────────────────────
function buildShoppingList() {
  const allIngredients = {};
  DAYS.forEach(day => {
    const entry = weekPlan[day];
    if (entry && entry.type === 'meal') {
      const meal = getMeal(entry.id);
      if (meal) {
        meal.ingredients.forEach(ing => {
          if (!allIngredients[ing.name]) allIngredients[ing.name] = [];
          allIngredients[ing.name].push(ing.qty);
        });
      }
    }
  });
  return allIngredients;
}

function renderShop() {
  document.getElementById('page-title').textContent = 'Shopping list';
  document.getElementById('page-sub').textContent = "Built from this week's planned dinners";
  document.getElementById('header-back').style.display = 'none';
  document.getElementById('add-recipe-fab').style.display = 'none';

  const list = buildShoppingList();
  const keys = Object.keys(list);

  if (keys.length === 0) {
    document.getElementById('main').innerHTML = `<div class="card" style="padding:30px 20px;text-align:center;color:var(--text-3)">
      <div style="font-size:32px;margin-bottom:10px">🛒</div>
      No dinners planned yet.<br>Go to <strong>This Week</strong> and pick some meals first.
    </div>`;
    return;
  }

  let html = `<div class="shop-actions">
    <button class="btn btn-primary" onclick="resetShop()">Reset checks</button>
    <button class="btn" onclick="copyShop()">Copy list</button>
  </div><div class="shop-section">`;

  keys.sort().forEach((name, i) => {
    const checked = !!checkedItems[name];
    const qtys = list[name].join(' + ');
    html += `<div class="shop-item${checked?' checked':''}" onclick="toggleShop('${name.replace(/'/g,"\\\\'")}',this)">
      <div class="shop-check">${checked?'✓':''}</div>
      <div class="shop-name">${name}</div>
      <div class="shop-qty">${qtys}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

function toggleShop(key, el) {
  checkedItems[key] = !checkedItems[key];
  saveState();
  el.classList.toggle('checked');
  el.querySelector('.shop-check').textContent = checkedItems[key] ? '✓' : '';
}

function resetShop() {
  checkedItems = {};
  saveState();
  renderShop();
  showToast('Checks reset');
}

function copyShop() {
  const list = buildShoppingList();
  const lines = Object.keys(list).sort().map(name => `• ${name} — ${list[name].join(' + ')}`);
  navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('List copied!'));
}

// ─── WEIGHT PAGE ────────────────────────────────────────────────────────────
function renderWeight() {
  document.getElementById('page-title').textContent = 'Progress';
  document.getElementById('page-sub').textContent = 'Goal: 160–165 lbs';
  document.getElementById('header-back').style.display = 'none';
  document.getElementById('add-recipe-fab').style.display = 'none';
  const start = 178, goal = 165;
  const current = weightLog.length > 1 ? weightLog[weightLog.length-1].weight : start;
  const lost = +(start - current).toFixed(1);
  const toGo = +(current - goal).toFixed(1);
  const pct = Math.min(100, Math.max(0, Math.round((lost / (start - goal)) * 100)));
  const weeksLeft = toGo > 0 ? Math.ceil(toGo / 1) : 0;

  let html = `<div class="stat-row">
    <div class="stat-card"><div class="stat-val">${current}</div><div class="stat-lbl">Current lbs</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${lost > 0 ? lost : 0}</div><div class="stat-lbl">lbs lost</div></div>
    <div class="stat-card"><div class="stat-val">${toGo > 0 ? toGo : '🎯'}</div><div class="stat-lbl">${toGo > 0 ? 'lbs to go' : 'Goal hit!'}</div></div>
  </div>
  <div class="progress-block">
    <div class="progress-label"><span>178 lbs</span><strong>Goal: 165 lbs</strong></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:12px;color:var(--text-3);margin-top:8px">${pct}% there · ~${weeksLeft} weeks at 1 lb/week</div>
  </div>
  <div class="weight-input-row">
    <input class="weight-input" type="number" id="weight-in" placeholder="Log today's weight (lbs)" step="0.1" min="100" max="400"/>
    <button class="btn btn-primary" onclick="logWeight()">Log</button>
  </div>`;

  if (weightLog.length > 0) {
    html += `<div class="weight-log">`;
    [...weightLog].reverse().forEach((entry, i, arr) => {
      const prev = arr[i+1];
      let delta = '';
      if (prev && entry.weight !== prev.weight) {
        const diff = +(entry.weight - prev.weight).toFixed(1);
        const cls = diff < 0 ? 'delta-down' : 'delta-up';
        delta = `<span class="weight-delta ${cls}">${diff > 0 ? '+' : ''}${diff} lbs</span>`;
      }
      html += `<div class="weight-log-row"><div><div style="font-weight:600">${entry.weight} lbs</div><div class="weight-log-date">${entry.date}</div></div>${delta}</div>`;
    });
    html += `</div>`;
  }
  document.getElementById('main').innerHTML = html;
}

function logWeight() {
  const input = document.getElementById('weight-in');
  const val = parseFloat(input.value);
  if (!val || val < 100 || val > 400) { showToast('Enter a valid weight'); return; }
  const today = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'});
  weightLog.push({date: today, weight: val});
  saveState();
  input.value = '';
  renderWeight();
  showToast(`${val} lbs logged`);
}

let formIngredients = [{name:'', qty:''}];
let formSteps = [''];
let formTags = [];

function openAddRecipe() {
  formIngredients = [{name:'', qty:''}];
  formSteps = [''];
  formTags = [];

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Add a recipe</div>
      <div class="page-sub-line">Got something from Facebook or a cookbook? Add it here.</div>

      <div class="form-group">
        <label class="form-label">Recipe name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Grandma's pot roast"/>

        <label class="form-label">One-line summary</label>
        <input class="form-input" id="f-summary" placeholder="e.g. Beef chuck, carrots, red wine braise"/>

        <div class="form-group">
          <label class="form-label">Calories (per serving)</label>

        <div class="form-group">

          <input class="form-input" id="f-pro" type="number" placeholder="42"/>

      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Cook time</label>
          <input class="form-input" id="f-time" placeholder="e.g. 30 min"/>
        </div>
        <div class="form-group">
          <label class="form-label">Tags</label>
          <div class="tag-toggle-row" id="f-tags">

            <span class="tag-toggle" data-tag="chicken" onclick="toggleFormTag('chicken',this)">Chicken</span>
            <span class="tag-toggle" data-tag="norice" onclick="toggleFormTag('norice',this)">No starch</span>
            <span class="tag-toggle" data-tag="rice" onclick="toggleFormTag('rice',this)">Rice night</span>
            <span class="tag-toggle" data-tag="batch" onclick="toggleFormTag('batch',this)">Batch cook</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Ingredients</label>
        <div id="f-ingredients"></div>
        <div class="dyn-add-btn" onclick="addIngredientRow()">+ Add ingredient</div>
      </div>

      <div class="form-group">
        <label class="form-label">Steps</label>
        <div id="f-steps"></div>
        <div class="dyn-add-btn" onclick="addStepRow()">+ Add step</div>
      </div>

      <div class="form-group">
        <label class="form-label">Tip (optional)</label>
        <textarea class="form-textarea" id="f-tip" placeholder="Any swap, shortcut, or note worth remembering"></textarea>
      </div>

      <div class="form-hint" style="margin-bottom:12px">Got a link or a photo from Facebook instead? Skip this form — just send it to Claude and it'll come back here structured properly.</div>

      <div style="display:flex;gap:8px">
        <button class="btn btn-full" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-full" onclick="saveNewRecipe()">Save recipe</button>
      </div>
    </div></div>`;

  document.getElementById('modal-root').innerHTML = html;
  renderIngredientRows();
  renderStepRows();
}

function toggleFormTag(tag, el) {
  if (formTags.includes(tag)) {
    formTags = formTags.filter(t => t !== tag);
    el.classList.remove('selected');
  } else {
    formTags.push(tag);
    el.classList.add('selected');
  }
}

function renderIngredientRows() {
  const c = document.getElementById('f-ingredients');
  c.innerHTML = formIngredients.map((ing, i) => `
    <div class="dyn-list-row">
      <input class="form-input" placeholder="Ingredient" value="${ing.name}" oninput="formIngredients[${i}].name=this.value"/>
      <input class="form-input" style="max-width:90px" placeholder="Qty" value="${ing.qty}" oninput="formIngredients[${i}].qty=this.value"/>
      <button class="dyn-remove" onclick="removeIngredientRow(${i})">✕</button>
    </div>`).join('');
}

function addIngredientRow() { formIngredients.push({name:'',qty:''}); renderIngredientRows(); }
function removeIngredientRow(i) { formIngredients.splice(i,1); if(formIngredients.length===0) formIngredients.push({name:'',qty:''}); renderIngredientRows(); }

function renderStepRows() {
  const c = document.getElementById('f-steps');
  c.innerHTML = formSteps.map((s, i) => `
    <div class="dyn-list-row">
      <input class="form-input" placeholder="Step ${i+1}" value="${s}" oninput="formSteps[${i}]=this.value"/>
      <button class="dyn-remove" onclick="removeStepRow(${i})">✕</button>
    </div>`).join('');
}

function addStepRow() { formSteps.push(''); renderStepRows(); }
function removeStepRow(i) { formSteps.splice(i,1); if(formSteps.length===0) formSteps.push(''); renderStepRows(); }

function saveNewRecipe() {
  const name = document.getElementById('f-name').value.trim();
  const summary = document.getElementById('f-summary').value.trim();
  const cal = parseInt(document.getElementById('f-cal').value) || 0;
  const pro = parseInt(document.getElementById('f-pro').value) || 0;
  const time = document.getElementById('f-time').value.trim() || '—';
  const tip = document.getElementById('f-tip').value.trim();

  if (!name) { showToast('Recipe needs a name'); return; }
  if (!cal) { showToast('Add a calorie estimate'); return; }

  const ingredients = formIngredients.filter(i => i.name.trim() !== '');
  const steps = formSteps.filter(s => s.trim() !== '');

  const id = 'custom_' + Date.now();
  customRecipes.push({
    id, name, summary: summary || 'Custom recipe', cal, pro,
    tags: formTags.length ? formTags : ['custom'],
    time, serves: 1, tip: tip || '',
    ingredients: ingredients.length ? ingredients : [{name:'See recipe notes', qty:''}],
    steps: steps.length ? steps : ['See recipe notes'],
    custom: true
  });
  saveCustomRecipes();
  closeModal();
  renderBank();
  showToast(`${name} added to food bank`);
}


function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navMap = {week:'nav-week', bank:'nav-bank', log:'nav-log', midday:'nav-midday', shop:'nav-shop', weight:'nav-weight'};
  if (navMap[page]) document.getElementById(navMap[page]).classList.add('active');
  const renders = {week:renderWeek, bank:renderBank, log:renderLog, midday:renderMidday, shop:renderShop, weight:renderWeight};
  if (renders[page]) renders[page]();
  window.scrollTo(0,0);
}

showPage('week');
